<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>TechLab Ecommerce</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>

<!-- NAVBAR -->
<header class="navbar">
  <h2>🛒 TechLab Store</h2>

  <div class="cart-info">
    <span id="cart-count">0</span> productos
  </div>
</header>

<!-- CONTENIDO -->
<main class="container">

  <!-- PRODUCTOS -->
  <section class="section">
    <h2> Productos</h2>
    <div id="productos"></div>
  </section>

  <!-- CARRITO -->
  <section class="section">
    <h2> Carrito</h2>

    <div id="carrito"></div>

    <div class="total">
      Total: $<span id="total">0</span>
    </div>

  </section>

  <!-- PEDIDOS (opcional si ya lo agregaste) -->
  <section class="section">
    <h2> Pedidos</h2>
    <div id="pedidos"></div>
  </section>

</main>

<script src="app.js"></script>
</body>
</html>
